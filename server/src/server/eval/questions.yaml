# Eval-Harness Questions — based on EnterpriseBench (Inazuma dataset)
# Each question is answerable from the ingested data.
# Runner checks: entity found, predicate present, confidence >= min, source cited.

- question: "Who is the Engineering Director at Inazuma?"
  expected_entity: "Raj Patel"
  expected_facts:
    - predicate: "job_title"
      object: "Engineering Director"
  expected_sources: ["hr:employees"]
  confidence_min: 0.8

- question: "What is Raj Patel's email address?"
  expected_entity: "Raj Patel"
  expected_facts:
    - predicate: "email"
      object: "raj.patel@inazuma.com"
  expected_sources: ["hr:employees"]
  confidence_min: 0.9

- question: "What department does Raj Patel work in?"
  expected_entity: "Raj Patel"
  expected_facts:
    - predicate: "department"
